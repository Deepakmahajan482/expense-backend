<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <title>Expense Tracker</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      display:flex;
      height:100vh;
      background:#f4f6f9;
    }


    /* Main Content */
    .main{
      flex:1;
      padding:20px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      margin-bottom:20px;
    }

    input{
      padding:10px;
      margin:5px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      padding:10px 15px;
      background:#27ae60;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#219150;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    th, td{
      border:1px solid #ddd;
      padding:10px;
      text-align:center;
    }

    th{
      background:#2c3e50;
      color:white;
    }

    tr:nth-child(even){
      background:#f2f2f2;
    }

    .total{
      font-size:20px;
      font-weight:bold;
      text-align:right;
      margin-top:10px;
    }
  </style>
</head>

<body>

  <div class="main">
    <div class="top">
      <h2>Dashboard</h2>
      <h2 id="sum">Total: 0</h2>
    </div>

    <div class="card">
      <h3>Add Expense</h3>
      <input type="text" placeholder="Title" id="title">
      <input type="number" placeholder="Amount" id="amount">
      <input type="text" placeholder="Category" id="category">
      <button onclick="add()">Add</button>
    </div>

    <div class="card">
      <h3>All Expenses</h3>
      <table>
        <tr>
          <th>Title</th>
          <th>Amount</th>
          <th>Category</th>
          <th>Date</th>
          <th>Delete</th>
        </tr>
        <tbody id="data"></tbody>
      </table>
    </div>
  </div>

<script>
async function sum(){
  try{
    const response = await axios.get('https://expense-backend.onrender.com/sum',{
      headers:{ token: localStorage.getItem('token') }
    });

    document.getElementById('sum').innerText = "Total: " + response.data.message ||0;
  }catch(error){
    alert(error.response.data.error);
  }
}

async function add(){
  const title = document.getElementById('title').value;
  const amount = document.getElementById('amount').value;
  const category = document.getElementById('category').value;

  try{
    await axios.post('https://expense-backend.onrender.com/add',{
      title, amount, category
    },{
      headers:{ token: localStorage.getItem('token') }
    });
    document.getElementById('title').value="";
    document.getElementById('amount').value="";
    document.getElementById('category').value="";
    alert("Expense Added");
  await view();
  await sum();
  }catch(error){
    document.getElementById('sum').innerText = "Total: 0"
  }
 
}

async function view(){
  try{
    const response = await axios.get('https://expense-backend.onrender.com/view',{
      headers:{ token: localStorage.getItem('token') }
    });

    const data = response.data.message;

   
    const tbody = document.getElementById('data');
     if(!data || data.length === 0){
      tbody.innerHTML = `<tr><td colspan="5">No Expenses</td></tr>`;
      return;
    }
    tbody.innerHTML = "";

    data.forEach(item => {
      const tr = document.createElement('tr');

      tr.innerHTML = `
        <td>${item.title}</td>
        <td>${item.amount}</td>
        <td>${item.category}</td>
        <td>${new Date(item.date).toLocaleDateString('en-GB')}</td>
        <td><button  onclick=deleted('${item._id}')>Delete</button></td>
      `;

      tbody.appendChild(tr);
    });

  }catch(error){
   
  }
}

async function deleted(id){
  try{
    const response=await axios.delete(`https://expense-backend.onrender.com/delete/${id}`,{
      headers:{
      token:localStorage.getItem('token')
      }}
    )
    await view();
    await sum();
  }
  catch(error){

  }
  }


window.onload = function(){
  view();
  sum();
}
</script>

</body>
</html>
