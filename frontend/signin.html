<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <title>Sign In</title>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #2980b9, #6dd5fa);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      width: 300px;
      text-align: center;
    }
    h2 { margin-bottom: 20px; }
    input {
      width: 90%; padding: 10px; margin: 10px 0;
      border: 1px solid #ccc; border-radius: 5px; font-size: 14px;
    }
    button {
      width: 95%; padding: 10px; background: #2980b9;
      color: white; border: none; border-radius: 5px;
      font-size: 16px; cursor: pointer; margin-top: 10px;
    }
    button:hover { background: #1f6694; }
    p { margin-top: 15px; font-size: 14px; }
    a { color: #2980b9; text-decoration: none; font-weight: bold; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="container">
    <h2>Sign In</h2>
    <input type="text" placeholder="Enter username" id="username">
    <input type="password" id="pass" placeholder="Enter the password">
    <button onclick="signin()">Sign in</button>
    <p>Don't have an account? <a href="index.html">Sign up</a></p> <!-- ✅ .html for Netlify -->
  </div>
  <script>
    const BASE_URL = "https://expense-backend-6i9n.onrender.com";
    async function signin(){
      const username = document.getElementById('username').value;
      const password = document.getElementById('pass').value;
      try {
        const response = await axios.post(`${BASE_URL}/signin`, { username, password });
        localStorage.setItem('token', response.data.token);
        alert("Login success");
        window.location.href = "dashboard.html"; // ✅ .html for Netlify
      } catch(err) {
        alert(err.response?.data?.message || "Server error");
      }
    }
  </script>
</body>
</html>
